{% extends "base.html" %}

{% block title %}Create Contest - CP Platform{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-card">
        <h1>Create New Contest</h1>
        
        {% if error %}
            <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form id="createContestForm" method="POST" class="form-layout">
            <div class="form-group">
                <label for="title">Contest Title *</label>
                <input type="text" id="title" name="title" required placeholder="Enter contest title">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" placeholder="Enter contest description"></textarea>
            </div>

            <div class="form-group">
                <label for="start_time">Start Time *</label>
                <input type="datetime-local" id="start_time" name="start_time" required>
            </div>

            <div class="form-group">
                <label for="end_time">End Time *</label>
                <input type="datetime-local" id="end_time" name="end_time" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create Contest</button>
                <a href="{{ url_for('contests.list_contests') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('createContestForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(document.getElementById('createContestForm'));
        const data = Object.fromEntries(formData);

        try {
            const response = await fetch('{{ url_for("contests.create_contest") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();
            if (result.success) {
                alert('Contest created successfully!');
                window.location.href = '{{ url_for("contests.list_contests") }}';
            } else {
                alert(result.message);
            }
        } catch (error) {
            console.error('Error:', error);
        }
    });
</script>
{% endblock %}
